workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "api"'
      when: always
    - when: never

stages:
  - check
  - build
  - deploy
  - train

variables:
  PYTHONUNBUFFERED: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_IMAGE: "$DOCKERHUB_USERNAME/mlops-password-frequency-service"

cache:
  paths:
    - .cache/pip

# =========================
# CHECK: lint
# =========================
lint:
  stage: check
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - ruff check .

# =========================
# CHECK: format
# =========================
format:
  stage: check
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - ruff format --check .

# =========================
# CHECK: tests
# =========================
test:
  stage: check
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - pytest -q

# =========================
# BUILD: Docker image with Kaniko
# =========================
build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  needs:
    - lint
    - format
    - test
  script:
    - |
      if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
        echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be set"
        exit 1
      fi
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(printf "%s:%s" "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${DOCKER_IMAGE}:latest"
      --single-snapshot
      --compressed-caching=false

# =========================
# DEPLOY: Render deploy hook
# =========================
deploy:
  stage: deploy
  image: curlimages/curl:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  needs:
    - build
  script:
    - |
      if [ -z "$RENDER_DEPLOY_HOOK" ]; then
        echo "RENDER_DEPLOY_HOOK must be set"
        exit 1
      fi
    - curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"

# =========================
# TRAIN: triggered from FastAPI /trigger
# =========================
train_model:
  stage: train
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "api" && $DATA_URL'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web" && $DATA_URL'
      when: always
    - when: never
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - |
      if [ -z "$DATA_URL" ]; then
        echo "DATA_URL variable is required for training pipeline"
        exit 1
      fi
    - python -m training.run_pipeline
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - reports/
      - validation_reports/
      - artifacts/
      - tests.json
      - validation_report.json