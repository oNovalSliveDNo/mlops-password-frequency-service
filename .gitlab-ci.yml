workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "api" && $DATA_URL'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web" && $DATA_URL'
      when: always
    - when: never

stages:
  - check
  - build
  - deploy
  - train

variables:
  PYTHONUNBUFFERED: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DOCKER_IMAGE: "$DOCKERHUB_USERNAME/mlops-password-frequency-service"
  TRAINING_IMAGE: "docker.io/$DOCKERHUB_USERNAME/mlops-password-frequency-service-training"

cache:
  paths:
    - .cache/pip

# =========================
# CHECK: lint
# =========================
lint:
  stage: check
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  before_script:
    - python -m pip install --upgrade pip
    - pip install ruff==0.15.15
  script:
    - ruff check .

# =========================
# CHECK: format
# =========================
format:
  stage: check
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  before_script:
    - python -m pip install --upgrade pip
    - pip install ruff==0.15.15
  script:
    - ruff format --check .

# =========================
# CHECK: tests
# =========================
test:
  stage: check
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - pytest -q

# =========================
# BUILD: Docker image with Kaniko
# =========================
build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  needs:
    - lint
    - format
    - test
  script:
    - |
      if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
        echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be set"
        exit 1
      fi
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(printf "%s:%s" "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${DOCKER_IMAGE}:latest"
      --single-snapshot
      --compressed-caching=false

build_training:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.14.0-debug
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  needs:
    - lint
    - format
    - test
  script:
    - |
      if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
        echo "DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be set"
        exit 1
      fi
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"$(printf "%s:%s" "${DOCKERHUB_USERNAME}" "${DOCKERHUB_TOKEN}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile.train"
      --destination "${TRAINING_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      --destination "${TRAINING_IMAGE}:latest"
      --single-snapshot
      --compressed-caching=false

# =========================
# DEPLOY: Amvera
# =========================
deploy:
  stage: deploy
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  needs:
    - build
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends git
    - rm -rf /var/lib/apt/lists/*
  script:
    - |
      if [ -z "$AMVERA_GIT_URL" ] || [ -z "$AMVERA_USERNAME" ] || [ -z "$AMVERA_PASSWORD" ]; then
        echo "AMVERA_GIT_URL, AMVERA_USERNAME and AMVERA_PASSWORD must be set"
        exit 1
      fi

    - |
      cat > amvera.yml <<EOF
      meta:
        environment: docker
        toolchain:
          name: docker
      
      build:
        skip: true
      
      run:
        image: ${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA}
        persistenceMount: /data
        containerPort: "8000"
      EOF

    - echo "Generated amvera.yml:"
    - cat amvera.yml

    - git config --global user.email "gitlab-ci@example.com"
    - git config --global user.name "GitLab CI"

    - mkdir amvera-deploy
    - cp amvera.yml amvera-deploy/amvera.yml
    - cd amvera-deploy

    - git init
    - git checkout -b master
    - git add amvera.yml
    - git commit -m "Deploy ${DOCKER_IMAGE}:${CI_COMMIT_SHORT_SHA} to Amvera"

    - |
      AMVERA_AUTH_URL="$(python - <<'PY'
      import os
      from urllib.parse import quote, urlparse, urlunparse

      raw_url = os.environ["AMVERA_GIT_URL"]
      username = quote(os.environ["AMVERA_USERNAME"], safe="")
      password = quote(os.environ["AMVERA_PASSWORD"], safe="")

      parsed = urlparse(raw_url)
      netloc = f"{username}:{password}@{parsed.netloc}"
      print(urlunparse((parsed.scheme, netloc, parsed.path, "", "", "")))
      PY
      )"

      git remote add amvera "$AMVERA_AUTH_URL"
      git push --force amvera master:master

# =========================
# TRAIN: triggered from FastAPI /trigger
# =========================
train_model:
  stage: train
  image: "$TRAINING_IMAGE:latest"
  resource_group: train-model-prod
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "api" && $DATA_URL'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web" && $DATA_URL'
      when: always
    - when: never
  script:
    - |
      if [ -z "$DATA_URL" ]; then
        echo "DATA_URL variable is required for training pipeline"
        exit 1
      fi
    - python -m training.run_pipeline
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - reports/
      - validation_reports/
      - artifacts/
      - tests.json
      - validation_report.json
