[tool.ruff]
extend-exclude = [".venv*", "venv*", "archive_old_project"]

[tool.mypy]
python_version = "3.11"
exclude = ["venv", "archive_old_project", ".venv*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
pythonpath = ["."]
norecursedirs = ["archive_old_project"]
filterwarnings = [
    "ignore::DeprecationWarning:opentelemetry.*",
    "ignore::DeprecationWarning:scipy.*",
    "ignore:Please import `LinAlgError` from the `scipy.linalg` namespace:DeprecationWarning",
    "ignore:Using `httpx` with `starlette.testclient` is deprecated.*",
    "ignore::pydantic.warnings.PydanticDeprecatedSince20:mlflow.*",
]