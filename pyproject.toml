[tool.mypy]
exclude = ["venv", "archive_old_project"]
python_version = "3.11"
disable_error_code = ["import-untyped"]

[[tool.mypy.overrides]]
module = ["sklearn.*", "evidently.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
pythonpath = ["."]
norecursedirs = ["archive_old_project"]
filterwarnings = [
    "ignore::DeprecationWarning:opentelemetry.*",
    "ignore::DeprecationWarning:scipy.*",
    "ignore:Please import `LinAlgError` from the `scipy.linalg` namespace:DeprecationWarning",
]